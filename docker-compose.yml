version: '3.8'\n\nservices:\n  api:\n    image: node:latest\n    ports:\n      - '3000:3000'\n    volumes:\n      - ./api:/usr/src/app\n    working_dir: /usr/src/app\n    command: npm start\n    environment:\n      - NODE_ENV=production\n      - MONGODB_URI=mongodb://mongo:27017/dbname\n\n  mongo:\n    image: mongo:latest\n    ports:\n      - '27017:27017'\n    volumes:\n      - mongo_data:/data/db\n\n  nginx:\n    image: nginx:latest\n    ports:\n      - '80:80'\n    volumes:\n      - ./nginx.conf:/etc/nginx/nginx.conf\n\nvolumes:\n  mongo_data: